<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chord Piano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap');

:root {
–bg: #0e0e12;
–surface: #16161e;
–card: #1e1e2a;
–border: #2a2a3a;
–accent: #c8a96e;
–accent2: #7eb8c8;
–minor: #a87eb8;
–dim: #b86e7e;
–text: #e8e4dc;
–muted: #6e6a62;
–danger: #c86e6e;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 24px 12px 48px;
background-image:
radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,169,110,0.07) 0%, transparent 70%),
radial-gradient(ellipse 50% 30% at 85% 100%, rgba(126,184,200,0.05) 0%, transparent 70%);
overflow-x: hidden;
}

header { text-align: center; margin-bottom: 24px; }

h1 {
font-family: ‘Playfair Display’, serif;
font-size: clamp(1.6rem, 5vw, 2.8rem);
font-weight: 700;
color: var(–accent);
letter-spacing: 0.04em;
}

.subtitle {
margin-top: 6px;
font-size: 0.62rem;
color: var(–muted);
letter-spacing: 0.14em;
text-transform: uppercase;
}

.main-col {
width: 100%;
max-width: 600px;
}

/* ── Visualizer ── */
#visualizer {
width: 100%;
height: 58px;
margin-bottom: 16px;
border-radius: 8px;
background: var(–surface);
border: 1px solid var(–border);
overflow: hidden;
position: relative;
}
#vis-canvas { width: 100%; height: 100%; display: block; }

.chord-label {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
font-family: ‘Playfair Display’, serif;
font-size: 1.4rem;
color: var(–accent);
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
text-shadow: 0 0 18px rgba(200,169,110,0.6);
white-space: nowrap;
}

/* ── Keyboard ── */
.keyboard-wrap {
width: 100%;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
margin-bottom: 20px;
border-radius: 8px;
border: 1px solid var(–border);
background: #111118;
padding: 10px 10px 0;
scrollbar-width: none;
}
.keyboard-wrap::-webkit-scrollbar { display: none; }

#keyboard {
position: relative;
height: 110px;
width: max-content;
margin: 0 auto;
}

.key {
position: absolute;
border-radius: 0 0 5px 5px;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
user-select: none;
transition: background 0.08s;
}
.key.white {
background: #f0ece4; border: 1px solid #bbb; border-top: none;
z-index: 1; width: 34px; height: 110px;
}
.key.black {
background: #1a1a22; border: 1px solid #000; border-top: none;
z-index: 2; width: 20px; height: 66px;
}
.key.white.lit { background: #e8d8a0; }
.key.black.lit { background: #5a4a20; }
.key-label {
position: absolute; bottom: 5px; left: 50%;
transform: translateX(-50%);
font-size: 0.46rem; color: #888; pointer-events: none;
}

/* ── Section label ── */
.section-label {
font-size: 0.6rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 10px;
display: flex; align-items: center; gap: 10px;
}
.section-label::after {
content: ‘’; flex: 1; height: 1px; background: var(–border);
}

/* ── API Key ── */
.apikey-area {
margin-bottom: 14px;
}

.apikey-row {
display: flex;
gap: 8px;
align-items: center;
}

.apikey-input {
flex: 1;
background: var(–card);
border: 1px solid var(–border);
border-radius: 8px;
padding: 9px 12px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.72rem;
outline: none;
transition: border-color 0.2s;
min-width: 0;
letter-spacing: 0.04em;
}
.apikey-input::placeholder { color: var(–muted); }
.apikey-input:focus { border-color: var(–accent); }

.apikey-save {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 9px 14px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.68rem;
cursor: pointer;
white-space: nowrap;
transition: border-color 0.2s, background 0.2s;
-webkit-tap-highlight-color: transparent;
}
.apikey-save:hover { border-color: var(–accent); }
.apikey-save.saved { border-color: #6eb87e; color: #6eb87e; }

.apikey-hint {
font-size: 0.56rem;
color: var(–muted);
margin-top: 5px;
line-height: 1.5;
}
.apikey-hint a { color: var(–accent); text-decoration: none; }

.apikey-status {
font-size: 0.62rem;
margin-top: 6px;
margin-bottom: 2px;
color: var(–muted);
letter-spacing: 0.04em;
}
.apikey-status.ok { color: #6eb87e; }

/* ── Search Box ── */
.search-area {
margin-bottom: 16px;
}

.search-row {
display: flex;
gap: 8px;
margin-bottom: 8px;
}

.search-input {
flex: 1;
background: var(–card);
border: 1px solid var(–border);
border-radius: 8px;
padding: 10px 14px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.78rem;
outline: none;
transition: border-color 0.2s;
min-width: 0;
}
.search-input::placeholder { color: var(–muted); }
.search-input:focus { border-color: var(–accent); }

.search-btn {
background: var(–accent);
border: none;
border-radius: 8px;
padding: 10px 16px;
color: #111;
font-family: ‘DM Mono’, monospace;
font-size: 0.72rem;
font-weight: 600;
cursor: pointer;
letter-spacing: 0.06em;
white-space: nowrap;
transition: opacity 0.2s;
-webkit-tap-highlight-color: transparent;
}
.search-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.search-btn:not(:disabled):hover { opacity: 0.85; }

/* ── Result card ── */
.result-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
padding: 14px;
margin-bottom: 16px;
display: none;
}
.result-card.visible { display: block; }

.result-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 10px;
margin-bottom: 10px;
flex-wrap: wrap;
}

.result-title {
font-family: ‘Playfair Display’, serif;
font-size: 1rem;
color: var(–text);
line-height: 1.3;
}

.result-meta {
font-size: 0.58rem;
color: var(–muted);
margin-top: 2px;
letter-spacing: 0.06em;
}

.result-actions {
display: flex;
gap: 8px;
align-items: center;
flex-shrink: 0;
}

/* playback controls */
.play-btn {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 7px;
padding: 7px 14px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.68rem;
cursor: pointer;
letter-spacing: 0.06em;
transition: border-color 0.2s, background 0.2s;
-webkit-tap-highlight-color: transparent;
}
.play-btn:hover { border-color: var(–accent); }
.play-btn.active { background: var(–accent); color: #111; border-color: var(–accent); }
.play-btn.stop   { border-color: var(–danger); color: var(–danger); }
.play-btn.stop:hover { background: rgba(200,110,110,0.1); }

/* chord sequence chips */
.chord-sequence {
display: flex;
flex-wrap: wrap;
gap: 6px;
margin-bottom: 10px;
}

.chord-chip {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
padding: 4px 10px;
font-size: 0.7rem;
color: var(–muted);
font-family: ‘Playfair Display’, serif;
transition: border-color 0.2s, color 0.2s;
}
.chord-chip.active-chip {
border-color: var(–accent);
color: var(–accent);
background: rgba(200,169,110,0.1);
}

.tempo-row {
display: flex;
align-items: center;
gap: 10px;
font-size: 0.6rem;
color: var(–muted);
}
input[type=range] {
-webkit-appearance: none;
width: 80px; height: 3px;
background: var(–border); border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 13px; height: 13px;
border-radius: 50%; background: var(–accent); cursor: pointer;
}

.note-text {
font-size: 0.6rem;
color: var(–muted);
line-height: 1.6;
border-top: 1px solid var(–border);
padding-top: 8px;
margin-top: 4px;
}

/* loading */
.loading-row {
display: none;
align-items: center;
gap: 10px;
font-size: 0.65rem;
color: var(–muted);
margin-bottom: 14px;
}
.loading-row.visible { display: flex; }

@keyframes spin {
to { transform: rotate(360deg); }
}
.spinner {
width: 14px; height: 14px;
border: 2px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.7s linear infinite;
}

.error-row {
display: none;
font-size: 0.63rem;
color: var(–danger);
margin-bottom: 12px;
}
.error-row.visible { display: block; }

/* ── Chord Buttons ── */
.chord-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 7px;
margin-bottom: 20px;
width: 100%;
}
@media (max-width: 340px) {
.chord-grid { grid-template-columns: repeat(3, 1fr); }
}

.chord-btn {
position: relative;
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px 2px 10px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
transition: transform 0.1s, box-shadow 0.2s, border-color 0.2s;
-webkit-tap-highlight-color: transparent;
user-select: none;
overflow: hidden;
min-width: 0; width: 100%;
}
.chord-btn::before {
content: ‘’; position: absolute; inset: 0;
border-radius: 10px; opacity: 0; transition: opacity 0.2s;
}
.chord-btn.major::before   { background: radial-gradient(circle at 50% 0%, rgba(200,169,110,0.18), transparent 70%); }
.chord-btn.minor::before   { background: radial-gradient(circle at 50% 0%, rgba(168,126,184,0.18), transparent 70%); }
.chord-btn.seventh::before { background: radial-gradient(circle at 50% 0%, rgba(126,184,200,0.18), transparent 70%); }
.chord-btn.dim::before     { background: radial-gradient(circle at 50% 0%, rgba(184,110,126,0.18), transparent 70%); }
.chord-btn:hover::before   { opacity: 1; }
.chord-btn:hover { transform: translateY(-2px); }
.chord-btn.major   { border-color: rgba(200,169,110,0.25); }
.chord-btn.minor   { border-color: rgba(168,126,184,0.25); }
.chord-btn.seventh { border-color: rgba(126,184,200,0.25); }
.chord-btn.dim     { border-color: rgba(184,110,126,0.25); }
.chord-btn.playing-now { transform: scale(0.94); }
.chord-btn.major.playing-now   { border-color: var(–accent);  box-shadow: 0 0 16px rgba(200,169,110,0.4); }
.chord-btn.minor.playing-now   { border-color: var(–minor);   box-shadow: 0 0 16px rgba(168,126,184,0.4); }
.chord-btn.seventh.playing-now { border-color: var(–accent2); box-shadow: 0 0 16px rgba(126,184,200,0.4); }
.chord-btn.dim.playing-now     { border-color: var(–dim);     box-shadow: 0 0 16px rgba(184,110,126,0.4); }

.btn-name {
font-family: ‘Playfair Display’, serif;
font-size: clamp(0.9rem, 3.5vw, 1.2rem);
font-weight: 700; line-height: 1;
}
.chord-btn.major   .btn-name { color: var(–accent); }
.chord-btn.minor   .btn-name { color: var(–minor); }
.chord-btn.seventh .btn-name { color: var(–accent2); }
.chord-btn.dim     .btn-name { color: var(–dim); }

.btn-type {
font-size: 0.5rem; letter-spacing: 0.05em;
text-transform: uppercase; color: var(–muted);
}

.legend {
display: flex; gap: 14px; flex-wrap: wrap;
justify-content: center; margin-top: 4px;
}
.legend-item {
display: flex; align-items: center; gap: 5px;
font-size: 0.57rem; color: var(–muted);
}
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-major   { background: var(–accent); }
.dot-minor   { background: var(–minor); }
.dot-seventh { background: var(–accent2); }
.dot-dim     { background: var(–dim); }

@keyframes ripple {
from { transform: scale(0); opacity: 0.5; }
to   { transform: scale(3.5); opacity: 0; }
}
.ripple {
position: absolute; border-radius: 50%;
width: 50px; height: 50px;
pointer-events: none;
animation: ripple 0.45s ease-out forwards;
}
.chord-btn.major   .ripple { background: rgba(200,169,110,0.3); }
.chord-btn.minor   .ripple { background: rgba(168,126,184,0.3); }
.chord-btn.seventh .ripple { background: rgba(126,184,200,0.3); }
.chord-btn.dim     .ripple { background: rgba(184,110,126,0.3); }
</style>

</head>

<script type="module">
// ══════════════════════════════
//  Audio Engine
// ══════════════════════════════
let actx = null, analyser = null;

function getCtx() {
  if (!actx) {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = actx.createAnalyser();
    analyser.fftSize = 512;
    analyser.connect(actx.destination);
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function playNote(freq, t, dur = 1.5) {
  const ac = getCtx();
  const g = ac.createGain();
  g.connect(analyser);
  [[1,.55],[2,.22],[3,.1],[4,.06],[5,.03],[6,.015]].forEach(([r,v]) => {
    const o = ac.createOscillator(), hg = ac.createGain();
    o.type = 'sine'; o.frequency.value = freq * r; hg.gain.value = v;
    o.connect(hg); hg.connect(g); o.start(t); o.stop(t + dur + 0.5);
  });
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.6, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.28, t + 0.1);
  g.gain.exponentialRampToValueAtTime(0.14, t + dur);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur + 0.5);
}

function midiToFreq(n) { return 440 * Math.pow(2, (n - 69) / 12); }

// ── Chord parsing ──
// Converts chord name string → array of MIDI notes
const NOTE_MAP = {
  'C':60,'C#':61,'Db':61,'D':62,'D#':63,'Eb':63,
  'E':64,'F':65,'F#':66,'Gb':66,'G':67,'G#':68,
  'Ab':68,'A':69,'A#':70,'Bb':70,'B':71,
  // Japanese ♭/♯ variants
  'C♯':61,'D♭':61,'D♯':63,'E♭':63,'F♯':66,'G♭':66,'G♯':68,'A♭':68,'A♯':70,'B♭':70
};

function parseChordToMidi(chordName) {
  // Normalise: remove spaces, replace ♭→b for matching
  const raw = chordName.trim();

  // Extract root
  let root = null, rest = '';
  // Try 2-char root first (C#, Db, etc.)
  const two = raw.slice(0, 2);
  if (NOTE_MAP[two] !== undefined) { root = NOTE_MAP[two]; rest = raw.slice(2); }
  else if (NOTE_MAP[raw[0]] !== undefined) { root = NOTE_MAP[raw[0]]; rest = raw.slice(1); }
  if (root === null) return null;

  // Base octave: put root around C4 (midi 60)
  let base = root;
  if (base < 48) base += 12;
  if (base > 64) base -= 12;

  // Determine intervals from rest
  const r = rest.toLowerCase();
  let intervals;

  if (r === '' || r === 'maj') {
    intervals = [0,4,7];
  } else if (r === 'm' || r === 'min' || r === '-') {
    intervals = [0,3,7];
  } else if (r === '7') {
    intervals = [0,4,7,10];
  } else if (r === 'maj7' || r === 'major7' || r === 'Δ7' || r === 'Δ') {
    intervals = [0,4,7,11];
  } else if (r === 'm7' || r === 'min7' || r === '-7') {
    intervals = [0,3,7,10];
  } else if (r === 'mmaj7' || r === 'm/maj7') {
    intervals = [0,3,7,11];
  } else if (r === 'sus2') {
    intervals = [0,2,7];
  } else if (r === 'sus4' || r === 'sus') {
    intervals = [0,5,7];
  } else if (r === 'dim' || r === 'o') {
    intervals = [0,3,6];
  } else if (r === 'dim7' || r === 'o7') {
    intervals = [0,3,6,9];
  } else if (r === 'aug' || r === '+') {
    intervals = [0,4,8];
  } else if (r === '6') {
    intervals = [0,4,7,9];
  } else if (r === 'm6') {
    intervals = [0,3,7,9];
  } else if (r === '9') {
    intervals = [0,4,7,10,14];
  } else if (r === 'maj9') {
    intervals = [0,4,7,11,14];
  } else if (r === 'm9') {
    intervals = [0,3,7,10,14];
  } else if (r === 'add9') {
    intervals = [0,4,7,14];
  } else if (r === '11') {
    intervals = [0,4,7,10,14,17];
  } else if (r === '13') {
    intervals = [0,4,7,10,14,21];
  } else if (r.startsWith('m7b5') || r === 'ø' || r === 'ø7') {
    intervals = [0,3,6,10];
  } else {
    // Fallback: major
    intervals = [0,4,7];
  }

  return intervals.map(i => base + i);
}

function chordType(name) {
  const r = name.replace(/^[A-Ga-g][#♯b♭]?/, '').toLowerCase();
  if (r.includes('maj7') || r.includes('Δ')) return 'seventh';
  if (r.includes('7') || r.includes('9') || r.includes('11') || r.includes('13')) return 'seventh';
  if (r.startsWith('m') || r.includes('min') || r === '-') return 'minor';
  if (r.includes('dim')) return 'dim';
  return 'major';
}

function playChord(notes, startTime) {
  const ac = getCtx();
  const t = startTime ?? ac.currentTime;
  notes.forEach((n, i) => playNote(midiToFreq(n), t + i * 0.022));
}

// ══════════════════════════════
//  Keyboard
// ══════════════════════════════
const WHITE_W = 34, WHITE_H = 110, BLACK_W = 20, BLACK_H = 66;
const WHITE_SEMI = [0,2,4,5,7,9,11];
const KB_START = 48, KB_END = 71;
const keyEls = {};

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  const whites = [];
  for (let m = KB_START; m <= KB_END; m++) if (WHITE_SEMI.includes(m%12)) whites.push(m);
  kb.style.width = (whites.length * (WHITE_W + 1) - 1) + 'px';
  const wx = {};
  whites.forEach((m, i) => { wx[m] = i * (WHITE_W + 1); });
  for (let m = KB_START; m <= KB_END; m++) {
    const semi = m % 12, isW = WHITE_SEMI.includes(semi);
    const el = document.createElement('div');
    el.className = 'key ' + (isW ? 'white' : 'black');
    el.style.top = '0px';
    if (isW) {
      el.style.left = wx[m] + 'px';
      if (semi === 0) {
        const lbl = document.createElement('span');
        lbl.className = 'key-label';
        lbl.textContent = 'C' + (Math.floor(m/12)-1);
        el.appendChild(lbl);
      }
    } else {
      el.style.left = (wx[m-1] + WHITE_W + 1 - BLACK_W/2 - 1) + 'px';
    }
    el.addEventListener('pointerdown', e => {
      e.preventDefault(); getCtx();
      playNote(midiToFreq(m), actx.currentTime);
      el.classList.add('lit');
      setTimeout(() => el.classList.remove('lit'), 280);
    });
    keyEls[m] = el;
    kb.appendChild(el);
  }
}
buildKeyboard();

function lightKeys(notes, ms = 500) {
  Object.values(keyEls).forEach(k => k.classList.remove('lit'));
  notes.forEach(n => {
    if (keyEls[n]) {
      keyEls[n].classList.add('lit');
      setTimeout(() => { if (keyEls[n]) keyEls[n].classList.remove('lit'); }, ms);
    }
  });
}

// ══════════════════════════════
//  Autoplay
// ══════════════════════════════
let autoTimer = null, autoStep = 0;
let currentSequence = []; // [{name, midi}]
let tempo = 80;

const tempoSlider = document.getElementById('tempo-slider');
const tempoVal    = document.getElementById('tempo-val');
tempoSlider.addEventListener('input', () => {
  tempo = parseInt(tempoSlider.value);
  tempoVal.textContent = tempo;
});

document.getElementById('stop-btn').addEventListener('click', stopAuto);
document.getElementById('play-btn').addEventListener('click', () => {
  if (currentSequence.length) startAuto();
});

function stopAuto() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  autoStep = 0;
  document.getElementById('play-btn').classList.remove('active');
  updateChipHighlight(-1);
}

function startAuto() {
  stopAuto();
  document.getElementById('play-btn').classList.add('active');
  runStep();
}

function runStep() {
  if (!currentSequence.length) return;
  const idx = autoStep % currentSequence.length;
  const chord = currentSequence[idx];
  if (chord.midi) {
    playChord(chord.midi);
    lightKeys(chord.midi, Math.max(280, (60/tempo)*1000*1.7));
  }
  updateChipHighlight(idx);
  showLabel(chord.name, chordType(chord.name));
  highlightChordBtn(chord.name);
  autoStep++;
  autoTimer = setTimeout(runStep, (60/tempo)*1000*2);
}

function updateChipHighlight(idx) {
  document.querySelectorAll('.chord-chip').forEach((c, i) => {
    c.classList.toggle('active-chip', i === idx);
  });
}

const chordLabelEl = document.getElementById('chord-label');
let labelTimer;
let currentColor = '#c8a96e';
const TYPE_COLOR = {major:'#c8a96e',minor:'#a87eb8',seventh:'#7eb8c8',dim:'#b86e7e'};

function showLabel(name, type) {
  currentColor = TYPE_COLOR[type] || '#c8a96e';
  chordLabelEl.style.color = currentColor;
  chordLabelEl.style.textShadow = `0 0 18px ${currentColor}80`;
  chordLabelEl.textContent = name;
  chordLabelEl.style.opacity = '1';
  clearTimeout(labelTimer);
  labelTimer = setTimeout(() => chordLabelEl.style.opacity = '0', 1300);
}

function highlightChordBtn(name) {
  document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('playing-now'));
  const t = document.querySelector(`.chord-btn[data-name="${name}"]`);
  if (t) { t.classList.add('playing-now'); setTimeout(() => t.classList.remove('playing-now'), 380); }

// ══════════════════════════════
//  Gemini API — Song Search
// ══════════════════════════════
const GEMINI_PROMPT = `You are a music theory expert. Output ONLY a raw JSON object — no markdown, no code fences, no prose before or after. Start with { and end with }.

Required fields:
{
  "title": "song title",
  "artist": "artist name",
  "key": "e.g. D major or A minor",
  "bpm": 72,
  "chords": ["D","A","Bm","F#m","G","D","G","A"],
  "note": "one sentence about the song in Japanese"
}

Rules:
- bpm must be a plain integer
- chords: standard names only: C Cm C7 Cmaj7 Cm7 Csus4 Cdim Bb Eb etc.
- Use Bb not A#, Eb not D#
- Pick the main repeating progression (4-8 chords)
- If unknown: chords=[], note="不明な曲です"
- Your entire response must be parseable by JSON.parse() with no modification.`;

async function searchSong(query) {
  if (!apiKey) throw new Error('APIキーが設定されていません。');

  // Use Google's SDK via CDN (avoids CORS issues in Safari)
  const { GoogleGenerativeAI } = await import('https://esm.run/@google/generative-ai');
  const genAI = new GoogleGenerativeAI(apiKey);
  const model = genAI.getGenerativeModel({
    model: 'gemini-2.0-flash',
    generationConfig: { temperature: 0.2, maxOutputTokens: 512 }
  });

  const result = await model.generateContent(GEMINI_PROMPT + '\n\nSong query: ' + query);
  const text = result.response.text();
  if (!text) throw new Error('Geminiから空のレスポンスが返りました。');

  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('JSONが見つかりませんでした: ' + text.slice(0, 80));
  try {
    return JSON.parse(match[0]);
  } catch(e) {
    const fixed = match[0].replace(/,\s*([}\]])/g, '$1');
    return JSON.parse(fixed);
  }
}

// ── UI for search ──
const searchInput = document.getElementById('search-input');
const searchBtn   = document.getElementById('search-btn');
const loadingRow  = document.getElementById('loading-row');
const errorRow    = document.getElementById('error-row');
const resultCard  = document.getElementById('result-card');

function setLoading(v) {
  loadingRow.classList.toggle('visible', v);
  if (v) {
    searchBtn.disabled = true;
  } else {
    // Only re-enable if key is set
    if (apiKey) searchBtn.disabled = false;
  }
}
function setError(msg) {
  errorRow.textContent = msg;
  errorRow.classList.toggle('visible', !!msg);
}

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  getCtx(); // unlock audio
  stopAuto();
  setError('');
  resultCard.classList.remove('visible');
  setLoading(true);

  try {
    const data = await searchSong(q);
    setLoading(false);

    if (!data.chords || data.chords.length === 0) {
      setError('コード情報が見つかりませんでした。別の曲名でお試しください。');
      return;
    }

    // Build sequence
    currentSequence = data.chords.map(name => ({
      name,
      midi: parseChordToMidi(name)
    }));

    // BPM
    if (data.bpm && data.bpm > 30) {
      tempo = Math.min(140, Math.max(40, data.bpm));
      tempoSlider.value = tempo;
      tempoVal.textContent = tempo;
    }

    // Render result card
    document.getElementById('result-title').textContent = `${data.title}`;
    document.getElementById('result-meta').textContent =
      `${data.artist}　|　${data.key}　|　推定 ${tempo} BPM`;

    const seqEl = document.getElementById('chord-sequence');
    seqEl.innerHTML = '';
    currentSequence.forEach(c => {
      const chip = document.createElement('span');
      chip.className = 'chord-chip';
      chip.textContent = c.name;
      seqEl.appendChild(chip);
    });

    document.getElementById('note-text').textContent = data.note || '';
    resultCard.classList.add('visible');

    // Auto-start
    startAuto();

  } catch(e) {
    setLoading(false);
    setError('エラーが発生しました: ' + e.message);
  }
}

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

const sectionsEl = document.getElementById('chord-sections');
SECTIONS.forEach(sec => {
  const lbl = document.createElement('div');
  lbl.className = 'section-label';

  sectionsEl.appendChild(lbl);

  const grid = document.createElement('div');

  sec.chords.forEach(chord => {

      r.addEventListener('animationend', () => r.remove());
      playChord(chord.notes);
      lightKeys(chord.notes, 500);

// ══════════════════════════════
//  Visualizer
// ══════════════════════════════
const canvas = document.getElementById('vis-canvas');
const vc = canvas.getContext('2d');

function resize() {
  canvas.width  = canvas.offsetWidth  * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  vc.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

(function draw() {
  requestAnimationFrame(draw);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  vc.clearRect(0,0,w,h);
  if (!analyser) {
    vc.beginPath(); vc.moveTo(0,h/2); vc.lineTo(w,h/2);
    vc.strokeStyle='#2a2a3a'; vc.lineWidth=1; vc.stroke(); return;
  }
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  vc.beginPath(); vc.lineWidth=1.5;
  vc.strokeStyle=currentColor; vc.shadowColor=currentColor; vc.shadowBlur=10;
  const sl = w/buf.length;
  buf.forEach((v,i) => {
    const y = h/2 + (v/128-1)*h*0.38;
    i===0 ? vc.moveTo(0,y) : vc.lineTo(i*sl,y);
  });
  vc.stroke(); vc.shadowBlur=0;
})();
</script>
