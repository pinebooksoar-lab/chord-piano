<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Offline Chord Piano</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@300;400&display=swap');

:root{
  --bg:#0d0d11;
  --surface:#17171f;
  --card:#20202b;
  --border:#2f2f40;
  --accent:#c8a96e;
  --text:#ece7df;
  --muted:#7d7971;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono', monospace;
  padding:18px 10px 40px;
  overflow-x:hidden;
  overscroll-behavior:none;
  touch-action:manipulation;
}

.main{
  width:100%;
  max-width:900px;
  margin:auto;
}

header{
  text-align:center;
  margin-bottom:16px;
}

h1{
  font-family:'Playfair Display', serif;
  color:var(--accent);
  font-size:1.9rem;
  margin-bottom:4px;
}

.sub{
  color:var(--muted);
  font-size:.7rem;
  letter-spacing:.14em;
}

#visualizer{
  position:relative;
  height:58px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--surface);
  margin-bottom:14px;
}

#vis{
  width:100%;
  height:100%;
}

#chordLabel{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display', serif;
  color:var(--accent);
  font-size:1.3rem;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s;
}

.keyboard-area{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:18px;
}

.keyboard-row{
  position:relative;
  height:96px;
  background:#111116;
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}

.key{
  position:absolute;
  border-radius:0 0 4px 4px;
  cursor:pointer;
  transition:.06s;
}

.white{
  width:8.33%;
  height:96px;
  background:#f3f3f3;
  border:1px solid #9a9a9a;
  z-index:1;
}

.black{
  width:5.4%;
  height:58px;
  background:#1a1a1a;
  border:1px solid #000;
  z-index:2;
}

.key.active{
  background:var(--accent) !important;
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
  margin-bottom:22px;
}

.panel-title{
  font-size:.72rem;
  color:var(--muted);
  letter-spacing:.14em;
  margin-bottom:10px;
}

textarea{
  width:100%;
  min-height:90px;
  resize:vertical;
  border:none;
  outline:none;
  border-radius:8px;
  background:var(--card);
  color:var(--text);
  font-family:inherit;
  line-height:1.6;
  padding:12px;
  margin-bottom:12px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:12px;
}

button{
  border:none;
  border-radius:8px;
  padding:10px 14px;
  cursor:pointer;
  font-family:inherit;
  font-weight:bold;
  transition:.08s;
}

button:active{
  transform:scale(.96);
}

.primary{
  background:var(--accent);
  color:#111;
}

.secondary{
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
}

.input-on{
  background:var(--accent);
  color:#111;
}

.slider-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.slider-wrap label{
  width:48px;
  color:var(--muted);
  font-size:.75rem;
}

.slider-wrap input{
  flex:1;
}

.value{
  width:48px;
  text-align:right;
  color:var(--accent);
}

.section-title{
  margin:22px 0 10px;
  color:var(--muted);
  font-size:.72rem;
  letter-spacing:.14em;
  display:flex;
  align-items:center;
  gap:10px;
}

.section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.chord{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 4px;
  text-align:center;
  cursor:pointer;
  transition:.08s;
}

.chord:active{
  transform:scale(.96);
}

.chord:hover{
  border-color:var(--accent);
}

.chord span{
  color:var(--accent);
  font-family:'Playfair Display', serif;
  font-size:.95rem;
}

.currentChord{
  border-color:var(--accent) !important;
  box-shadow:0 0 0 1px var(--accent);
}

.footer{
  text-align:center;
  margin-top:24px;
  font-size:.68rem;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="main">

<header>
  <h1>Chord Piano</h1>
  <div class="sub">
    OFFLINE • NO API • MOBILE OPTIMIZED
  </div>
</header>

<div id="visualizer">
  <canvas id="vis"></canvas>
  <div id="chordLabel"></div>
</div>

<div class="keyboard-area">

  <div
    class="keyboard-row"
    id="kb-high"
  ></div>

  <div
    class="keyboard-row"
    id="kb-mid"
  ></div>

  <div
    class="keyboard-row"
    id="kb-low"
  ></div>

</div>

<div class="panel">

  <div class="panel-title">
    CHORD PROGRESSION
  </div>

  <textarea id="progression">C G Am Em
F C F G</textarea>

  <div class="controls">

    <button
      class="primary"
      id="playBtn"
    >
      ▶ PLAY
    </button>

    <button
      class="secondary"
      id="stopBtn"
    >
      ■ STOP
    </button>

    <button
      class="secondary"
      id="clearBtn"
    >
      CLEAR
    </button>

    <button
      class="secondary"
      id="inputModeBtn"
    >
      INPUT MODE: OFF
    </button>

  </div>

  <div class="slider-wrap">

    <label>BPM</label>

    <input
      type="range"
      id="bpm"
      min="40"
      max="240"
      value="120"
    >

    <div
      class="value"
      id="bpmValue"
    >
      120
    </div>

  </div>

  <div class="slider-wrap">

    <label>HOLD</label>

    <input
      type="range"
      id="hold"
      min="1"
      max="8"
      value="4"
    >

    <div
      class="value"
      id="holdValue"
    >
      4
    </div>

  </div>

</div>

<div id="sections"></div>

<div class="footer">
  Pure Offline Chord Instrument
</div>

</div>

<script type="module">

// ======================================
// AUDIO
// ======================================

let audioCtx = null;
let analyser = null;

const activeOscillators = [];

function getAudio(){

  if(!audioCtx){

    audioCtx = new (
      window.AudioContext ||
      window.webkitAudioContext
    )();

    analyser =
      audioCtx.createAnalyser();

    analyser.fftSize = 2048;

    analyser.connect(
      audioCtx.destination
    );
  }

  return audioCtx;
}

function midiToFreq(midi){

  return 440 * Math.pow(
    2,
    (midi - 69) / 12
  );
}

function playTone(
  midi,
  start,
  duration = 1.7,
  velocity = 0.16
){

  const ac = getAudio();

  const master =
    ac.createGain();

  master.connect(analyser);

  master.gain.setValueAtTime(
    0,
    start
  );

  master.gain.linearRampToValueAtTime(
    velocity,
    start + 0.02
  );

  master.gain.exponentialRampToValueAtTime(
    0.0001,
    start + duration
  );

  const harmonics = [
    {mul:1,gain:1},
    {mul:2,gain:.24},
    {mul:3,gain:.10},
    {mul:4,gain:.04}
  ];

  harmonics.forEach(h => {

    const osc =
      ac.createOscillator();

    osc.type = 'sine';

    osc.frequency.value =
      midiToFreq(midi) * h.mul;

    const g =
      ac.createGain();

    g.gain.value =
      velocity * h.gain;

    osc.connect(g);
    g.connect(master);

    osc.start(start);
    osc.stop(start + duration);

    activeOscillators.push(osc);

    osc.onended = () => {

      const idx =
        activeOscillators.indexOf(osc);

      if(idx !== -1){

        activeOscillators.splice(idx,1);
      }
    };

  });
}

function stopAll(){

  activeOscillators.forEach(osc => {

    try{
      osc.stop();
    }catch(e){}
  });

  activeOscillators.length = 0;
}

// ======================================
// MUSIC THEORY
// ======================================

const ROOTS = {

  'C':60,
  'C#':61,
  'Db':61,

  'D':62,
  'D#':63,
  'Eb':63,

  'E':64,

  'F':65,
  'F#':66,
  'Gb':66,

  'G':67,
  'G#':68,
  'Ab':68,

  'A':69,
  'A#':70,
  'Bb':70,

  'B':71
};

function getChordNotes(name){

  let chord =
    name.trim();

  let rootName = null;

  const two =
    chord.slice(0,2);

  if(ROOTS[two] !== undefined){

    rootName = two;
    chord = chord.slice(2);

  }else if(
    ROOTS[chord[0]] !== undefined
  ){

    rootName = chord[0];
    chord = chord.slice(1);
  }

  if(!rootName){
    return null;
  }

  let root =
    ROOTS[rootName];

  while(root > 59){
    root -= 12;
  }

  while(root < 48){
    root += 12;
  }

  const low =
    chord.toLowerCase();

  let notes = [];

  if(low.includes('maj7')){

    notes = [
      root,
      root + 7,
      root + 11,
      root + 16
    ];

  }else if(low.includes('m7')){

    notes = [
      root,
      root + 7,
      root + 10,
      root + 15
    ];

  }else if(
    low.includes('min') ||
    /^m(?!aj)/.test(low)
  ){

    notes = [
      root,
      root + 7,
      root + 15
    ];

  }else if(low.includes('7')){

    notes = [
      root,
      root + 10,
      root + 16,
      root + 19
    ];

  }else if(low.includes('sus4')){

    notes = [
      root,
      root + 7,
      root + 12,
      root + 17
    ];

  }else if(low.includes('dim')){

    notes = [
      root,
      root + 3,
      root + 6,
      root + 15
    ];

  }else{

    notes = [
      root,
      root + 7,
      root + 16
    ];
  }

  return notes;
}

// ======================================
// KEYBOARD
// ======================================

const keyMap = {};

function createKeyboardRow(
  containerId,
  startMidi
){

  const row =
    document.getElementById(
      containerId
    );

  const blackMap = {
    1:6.2,
    3:14.5,
    6:31.2,
    8:39.5,
    10:47.8
  };

  for(let i=0;i<12;i++){

    const midi =
      startMidi + i;

    const pc =
      midi % 12;

    const isBlack =
      [1,3,6,8,10]
      .includes(pc);

    const key =
      document.createElement('div');

    key.className =
      `key ${isBlack ? 'black' : 'white'}`;

    if(isBlack){

      key.style.left =
        blackMap[pc] + '%';

    }else{

      const whiteIndex =
        [0,2,4,5,7,9,11]
        .indexOf(pc);

      key.style.left =
        (whiteIndex * 8.33)
        + '%';
    }

    const trigger = () => {

      playTone(
        midi,
        getAudio().currentTime,
        1.5,
        .20
      );

      lightKey(midi);
    };

    key.onmousedown = trigger;
    key.ontouchstart = e => {

      e.preventDefault();
      trigger();
    };

    keyMap[midi] = key;

    row.appendChild(key);
  }
}

createKeyboardRow(
  'kb-high',
  72
);

createKeyboardRow(
  'kb-mid',
  60
);

createKeyboardRow(
  'kb-low',
  48
);

function lightKey(midi){

  if(!keyMap[midi]){
    return;
  }

  keyMap[midi]
    .classList.add('active');

  setTimeout(() => {

    keyMap[midi]
      .classList.remove('active');

  }, 400);
}

// ======================================
// PLAY CHORD
// ======================================

function playChord(name){

  const notes =
    getChordNotes(name);

  if(!notes){
    return;
  }

  const now =
    getAudio().currentTime;

  notes.forEach((midi,i) => {

    playTone(
      midi,
      now + i * .018,
      1.8,
      .16
    );

    lightKey(midi);
  });

  const label =
    document.getElementById(
      'chordLabel'
    );

  label.textContent = name;

  label.style.opacity = 1;

  setTimeout(() => {

    label.style.opacity = 0;

  }, 900);
}

// ======================================
// INPUT MODE
// ======================================

let inputMode = false;

const inputBtn =
  document.getElementById(
    'inputModeBtn'
  );

inputBtn.onclick = () => {

  inputMode = !inputMode;

  inputBtn.textContent =
    inputMode
    ? 'INPUT MODE: ON'
    : 'INPUT MODE: OFF';

  inputBtn.classList.toggle(
    'input-on',
    inputMode
  );
};

function addChord(chord){

  const area =
    document.getElementById(
      'progression'
    );

  let value =
    area.value.trim();

  if(value.length > 0){

    value += ' ';
  }

  value += chord;

  area.value = value;
}

// ======================================
// CHORD BUTTONS
// ======================================

const DATA = [

{
  title:'Basic',
  chords:[
    'C','Dm','Em',
    'F','G','Am',
    'Bdim'
  ]
},

{
  title:'Minor',
  chords:[
    'Cm','Fm',
    'Gm','Bm'
  ]
},

{
  title:'7th',
  chords:[
    'C7','D7',
    'E7','F7',
    'G7','A7'
  ]
},

{
  title:'Maj7',
  chords:[
    'Cmaj7',
    'Dmaj7',
    'Fmaj7',
    'Gmaj7'
  ]
},

{
  title:'Soul / Jazz',
  chords:[
    'Am7','Dm7',
    'Em7','Gsus4',
    'Csus4','Bb',
    'Eb','F#m'
  ]
}

];

const sections =
  document.getElementById(
    'sections'
  );

DATA.forEach(section => {

  const title =
    document.createElement('div');

  title.className =
    'section-title';

  title.textContent =
    section.title;

  sections.appendChild(title);

  const grid =
    document.createElement('div');

  grid.className = 'grid';

  section.chords.forEach(chord => {

    const btn =
      document.createElement('div');

    btn.className = 'chord';

    btn.innerHTML =
      `<span>${chord}</span>`;

    btn.onclick = () => {

      playChord(chord);

      if(inputMode){

        addChord(chord);
      }
    };

    grid.appendChild(btn);
  });

  sections.appendChild(grid);
});

// ======================================
// PROGRESSION
// ======================================

const area =
  document.getElementById(
    'progression'
  );

const bpm =
  document.getElementById(
    'bpm'
  );

const bpmValue =
  document.getElementById(
    'bpmValue'
  );

const hold =
  document.getElementById(
    'hold'
  );

const holdValue =
  document.getElementById(
    'holdValue'
  );

bpm.oninput = () => {

  bpmValue.textContent =
    bpm.value;
};

hold.oninput = () => {

  holdValue.textContent =
    hold.value;
};

let timer = null;
let index = 0;

function parseProgression(){

  return area.value
    .split(/\s+/)
    .filter(Boolean);
}

function clearHighlights(){

  document.querySelectorAll(
    '.currentChord'
  ).forEach(el => {

    el.classList.remove(
      'currentChord'
    );
  });
}

function highlightChord(chord){

  clearHighlights();

  document.querySelectorAll(
    '.chord'
  ).forEach(el => {

    if(
      el.innerText.trim()
      === chord
    ){

      el.classList.add(
        'currentChord'
      );
    }
  });
}

function playProgression(){

  stopProgression();

  const chords =
    parseProgression();

  if(!chords.length){
    return;
  }

  const interval =
    (60 / Number(bpm.value))
    * 1000
    * Number(hold.value);

  index = 0;

  function next(){

    const chord =
      chords[
        index % chords.length
      ];

    playChord(chord);

    highlightChord(chord);

    index++;

    timer =
      setTimeout(
        next,
        interval
      );
  }

  next();
}

function stopProgression(){

  clearTimeout(timer);

  stopAll();

  clearHighlights();
}

document.getElementById(
  'playBtn'
).onclick = playProgression;

document.getElementById(
  'stopBtn'
).onclick = stopProgression;

document.getElementById(
  'clearBtn'
).onclick = () => {

  area.value = '';
};

// ======================================
// VISUALIZER
// ======================================

const canvas =
  document.getElementById(
    'vis'
  );

const ctx =
  canvas.getContext('2d');

function draw(){

  requestAnimationFrame(draw);

  const w =
    canvas.width =
    canvas.offsetWidth;

  const h =
    canvas.height =
    canvas.offsetHeight;

  ctx.clearRect(0,0,w,h);

  if(!analyser){
    return;
  }

  const data =
    new Uint8Array(
      analyser.frequencyBinCount
    );

  analyser.getByteTimeDomainData(
    data
  );

  ctx.beginPath();

  ctx.strokeStyle =
    '#c8a96e';

  ctx.lineWidth = 2;

  data.forEach((v,i) => {

    const x =
      (i / data.length) * w;

    const y =
      (
        ((v - 128) / 128)
        * (h / 2)
      ) + (h / 2);

    if(i === 0){

      ctx.moveTo(x,y);

    }else{

      ctx.lineTo(x,y);
    }
  });

  ctx.stroke();
}

draw();

window.addEventListener(
  'beforeunload',
  stopAll
);

</script>

</body>
</html>
