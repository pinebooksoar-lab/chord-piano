<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Offline Chord Piano</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@300;400&display=swap');

:root{
  --bg:#0d0d11;
  --surface:#17171f;
  --card:#20202b;
  --border:#2f2f40;
  --accent:#c8a96e;
  --text:#ece7df;
  --muted:#807b73;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono', monospace;
  padding:24px 12px 50px;
  display:flex;
  justify-content:center;
}

.main{
  width:100%;
  max-width:760px;
}

header{
  text-align:center;
  margin-bottom:20px;
}

h1{
  font-family:'Playfair Display', serif;
  color:var(--accent);
  font-size:2rem;
  margin-bottom:6px;
}

.sub{
  color:var(--muted);
  font-size:.72rem;
  letter-spacing:.12em;
}

#visualizer{
  position:relative;
  height:72px;
  border-radius:10px;
  overflow:hidden;
  background:var(--surface);
  border:1px solid var(--border);
  margin-bottom:18px;
}

#vis{
  width:100%;
  height:100%;
}

#chordLabel{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  pointer-events:none;
  font-family:'Playfair Display', serif;
  font-size:1.6rem;
  color:var(--accent);
  opacity:0;
  transition:opacity .25s;
}

.keyboard-wrap{
  overflow-x:auto;
  background:#101014;
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:24px;
  scrollbar-width:none;
}

.keyboard-wrap::-webkit-scrollbar{
  display:none;
}

#keyboard{
  position:relative;
  width:max-content;
  height:180px;
  margin:auto;
}

.key{
  position:absolute;
  border-radius:0 0 6px 6px;
  cursor:pointer;
  transition:.08s;
  user-select:none;
}

.white{
  width:42px;
  height:180px;
  background:#f3f3f3;
  border:1px solid #999;
  z-index:1;
}

.black{
  width:26px;
  height:108px;
  background:#1c1c1c;
  border:1px solid #000;
  z-index:2;
}

.key.active{
  background:var(--accent) !important;
}

.section-title{
  margin:22px 0 12px;
  font-size:.72rem;
  letter-spacing:.15em;
  color:var(--muted);
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:10px;
}

.section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.chord{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 6px;
  text-align:center;
  cursor:pointer;
  transition:.08s;
}

.chord:hover{
  border-color:var(--accent);
}

.chord:active{
  transform:scale(.96);
}

.chord span{
  font-family:'Playfair Display', serif;
  color:var(--accent);
  font-size:1rem;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:var(--muted);
  font-size:.7rem;
}

@media(max-width:580px){

  .grid{
    grid-template-columns:repeat(3,1fr);
  }

}

</style>
</head>

<body>

<div class="main">

<header>
  <h1>Chord Piano</h1>
  <div class="sub">OFFLINE • LOCAL AUDIO • NO API</div>
</header>

<div id="visualizer">
  <canvas id="vis"></canvas>
  <div id="chordLabel"></div>
</div>

<div class="keyboard-wrap">
  <div id="keyboard"></div>
</div>

<div id="sections"></div>

<div class="footer">
  Pure Offline Chord Instrument
</div>

</div>

<script type="module">

// ======================================
// AUDIO
// ======================================

let audioCtx = null;
let analyser = null;

const activeOscillators = [];

function getAudio(){

  if(!audioCtx){

    audioCtx = new (
      window.AudioContext ||
      window.webkitAudioContext
    )();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.connect(audioCtx.destination);
  }

  return audioCtx;
}

function midiToFreq(midi){

  return 440 * Math.pow(
    2,
    (midi - 69) / 12
  );
}

function playTone(
  midi,
  start,
  duration = 1.8,
  velocity = 0.16
){

  const ac = getAudio();

  const master = ac.createGain();

  master.connect(analyser);

  master.gain.setValueAtTime(
    0,
    start
  );

  master.gain.linearRampToValueAtTime(
    velocity,
    start + 0.02
  );

  master.gain.exponentialRampToValueAtTime(
    0.0001,
    start + duration
  );

  const harmonics = [
    {mul:1,gain:1.0},
    {mul:2,gain:0.25},
    {mul:3,gain:0.10},
    {mul:4,gain:0.04}
  ];

  harmonics.forEach(h => {

    const osc = ac.createOscillator();
    osc.type = 'sine';

    osc.frequency.value =
      midiToFreq(midi) * h.mul;

    const gain = ac.createGain();

    gain.gain.value =
      velocity * h.gain;

    osc.connect(gain);
    gain.connect(master);

    osc.start(start);
    osc.stop(start + duration);

    activeOscillators.push(osc);

    osc.onended = () => {

      const idx =
        activeOscillators.indexOf(osc);

      if(idx !== -1){

        activeOscillators.splice(idx,1);
      }

      try{
        osc.disconnect();
      }catch(e){}

      try{
        gain.disconnect();
      }catch(e){}
    };

  });

  setTimeout(() => {

    try{
      master.disconnect();
    }catch(e){}

  }, (duration * 1000) + 100);
}

function stopAll(){

  activeOscillators.forEach(osc => {

    try{
      osc.stop();
    }catch(e){}

    try{
      osc.disconnect();
    }catch(e){}
  });

  activeOscillators.length = 0;
}

// ======================================
// MUSIC THEORY
// ======================================

const ROOTS = {

  'C':60,
  'C#':61,
  'Db':61,

  'D':62,
  'D#':63,
  'Eb':63,

  'E':64,

  'F':65,
  'F#':66,
  'Gb':66,

  'G':67,
  'G#':68,
  'Ab':68,

  'A':69,
  'A#':70,
  'Bb':70,

  'B':71
};

function getChordNotes(name){

  let chord = name.trim();

  let rootName = null;

  const two = chord.slice(0,2);

  if(ROOTS[two] !== undefined){

    rootName = two;
    chord = chord.slice(2);

  }else if(ROOTS[chord[0]] !== undefined){

    rootName = chord[0];
    chord = chord.slice(1);
  }

  if(!rootName) return null;

  let root = ROOTS[rootName];

  while(root > 59){
    root -= 12;
  }

  while(root < 48){
    root += 12;
  }

  const low = chord.toLowerCase();

  let notes = [];

  // smoother piano voicings

  if(low.includes('maj7')){

    notes = [
      root,
      root + 7,
      root + 11,
      root + 16
    ];

  }else if(low.includes('m7b5')){

    notes = [
      root,
      root + 6,
      root + 10,
      root + 15
    ];

  }else if(low.includes('dim7')){

    notes = [
      root,
      root + 3,
      root + 6,
      root + 9
    ];

  }else if(low.includes('m7')){

    notes = [
      root,
      root + 7,
      root + 10,
      root + 15
    ];

  }else if(
    low.includes('min') ||
    /^m(?!aj)/.test(low)
  ){

    notes = [
      root,
      root + 7,
      root + 15
    ];

  }else if(low.includes('7')){

    notes = [
      root,
      root + 10,
      root + 16,
      root + 19
    ];

  }else if(low.includes('sus4')){

    notes = [
      root,
      root + 7,
      root + 12,
      root + 17
    ];

  }else if(low.includes('dim')){

    notes = [
      root,
      root + 3,
      root + 6,
      root + 15
    ];

  }else if(low.includes('aug')){

    notes = [
      root,
      root + 8,
      root + 16
    ];

  }else{

    // major

    notes = [
      root,
      root + 7,
      root + 16
    ];
  }

  return notes;
}

// ======================================
// KEYBOARD
// ======================================

const keyboard =
  document.getElementById('keyboard');

const keyMap = {};

function createKeyboard(){

  const whitePitchClasses = [
    0,2,4,5,7,9,11
  ];

  const blackOffsets = {
    1:-13,
    3:-13,
    6:-13,
    8:-13,
    10:-13
  };

  let whiteIndex = 0;

  for(let midi=48; midi<=83; midi++){

    const pitchClass = midi % 12;

    const isWhite =
      whitePitchClasses.includes(
        pitchClass
      );

    const key =
      document.createElement('div');

    key.className =
      `key ${isWhite ? 'white' : 'black'}`;

    if(isWhite){

      key.style.left =
        (whiteIndex * 42) + 'px';

      whiteIndex++;

    }else{

      key.style.left =
        (
          whiteIndex * 42
          + blackOffsets[pitchClass]
        ) + 'px';
    }

    key.onmousedown = () => {

      playTone(
        midi,
        getAudio().currentTime,
        1.5,
        0.20
      );

      lightKey(midi);
    };

    keyMap[midi] = key;

    keyboard.appendChild(key);
  }
}

createKeyboard();

function lightKey(midi){

  if(!keyMap[midi]) return;

  keyMap[midi].classList.add('active');

  setTimeout(() => {

    keyMap[midi].classList.remove('active');

  }, 400);
}

// ======================================
// CHORD PLAY
// ======================================

function playChord(name){

  const notes =
    getChordNotes(name);

  if(!notes) return;

  const now =
    getAudio().currentTime;

  notes.forEach((midi,index) => {

    playTone(
      midi,
      now + (index * 0.018),
      1.8,
      0.16
    );

    lightKey(midi);
  });

  const label =
    document.getElementById(
      'chordLabel'
    );

  label.textContent = name;
  label.style.opacity = 1;

  setTimeout(() => {

    label.style.opacity = 0;

  }, 900);
}

// ======================================
// CHORD SECTIONS
// ======================================

const DATA = [

{
  title:'Basic',
  chords:[
    'C','Dm','Em','F',
    'G','Am','Bdim'
  ]
},

{
  title:'Minor',
  chords:[
    'Cm','Dm','Em','Fm',
    'Gm','Am','Bm'
  ]
},

{
  title:'7th',
  chords:[
    'C7','D7','E7',
    'F7','G7','A7'
  ]
},

{
  title:'Maj7',
  chords:[
    'Cmaj7','Dmaj7',
    'Fmaj7','Gmaj7',
    'Amaj7'
  ]
},

{
  title:'Soul / Jazz',
  chords:[
    'Am7','Dm7',
    'Em7','Gsus4',
    'Csus4','Bb',
    'Eb','F#m'
  ]
}

];

const sections =
  document.getElementById('sections');

DATA.forEach(section => {

  const title =
    document.createElement('div');

  title.className = 'section-title';
  title.textContent = section.title;

  sections.appendChild(title);

  const grid =
    document.createElement('div');

  grid.className = 'grid';

  section.chords.forEach(chord => {

    const btn =
      document.createElement('div');

    btn.className = 'chord';

    btn.innerHTML =
      `<span>${chord}</span>`;

    btn.onclick = () => {

      playChord(chord);
    };

    grid.appendChild(btn);
  });

  sections.appendChild(grid);
});

// ======================================
// VISUALIZER
// ======================================

const canvas =
  document.getElementById('vis');

const vctx =
  canvas.getContext('2d');

function draw(){

  requestAnimationFrame(draw);

  const w =
    canvas.width =
    canvas.offsetWidth;

  const h =
    canvas.height =
    canvas.offsetHeight;

  vctx.clearRect(0,0,w,h);

  if(!analyser) return;

  const data =
    new Uint8Array(
      analyser.frequencyBinCount
    );

  analyser.getByteTimeDomainData(data);

  vctx.beginPath();

  vctx.lineWidth = 2;
  vctx.strokeStyle = '#c8a96e';

  data.forEach((v,i) => {

    const x =
      (i / data.length) * w;

    const y =
      (
        ((v - 128) / 128)
        * (h / 2)
      ) + (h / 2);

    if(i === 0){

      vctx.moveTo(x,y);

    }else{

      vctx.lineTo(x,y);
    }

  });

  vctx.stroke();
}

draw();

// ======================================
// SAFETY
// ======================================

window.addEventListener(
  'beforeunload',
  stopAll
);

</script>

</body>
</html>
