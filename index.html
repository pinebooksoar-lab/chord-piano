<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Chord Piano - Improved Edition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap');

:root{
  --bg:#0e0e12;
  --surface:#16161e;
  --card:#1e1e2a;
  --border:#2a2a3a;
  --accent:#c8a96e;
  --accent2:#7eb8c8;
  --text:#e8e4dc;
  --muted:#7b776f;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono', monospace;
  min-height:100vh;
  padding:24px 12px 40px;
  display:flex;
  justify-content:center;
}

.main-col{
  width:100%;
  max-width:700px;
}

header{
  text-align:center;
  margin-bottom:20px;
}

h1{
  font-family:'Playfair Display', serif;
  color:var(--accent);
  font-size:2rem;
  margin-bottom:6px;
}

.sub{
  color:var(--muted);
  font-size:.75rem;
  letter-spacing:.08em;
}

#visualizer{
  width:100%;
  height:70px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  margin-bottom:18px;
}

#vis-canvas{
  width:100%;
  height:100%;
}

.chord-label{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display', serif;
  font-size:1.7rem;
  color:var(--accent);
  opacity:0;
  transition:opacity .25s;
  pointer-events:none;
}

.keyboard-wrap{
  overflow-x:auto;
  background:#111;
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:22px;
  scrollbar-width:none;
}

.keyboard-wrap::-webkit-scrollbar{
  display:none;
}

#keyboard{
  position:relative;
  width:max-content;
  height:170px;
  margin:auto;
}

.key{
  position:absolute;
  border-radius:0 0 6px 6px;
  cursor:pointer;
  transition:.08s;
  user-select:none;
}

.white{
  width:42px;
  height:170px;
  background:#f2f2f2;
  border:1px solid #999;
  z-index:1;
}

.black{
  width:26px;
  height:104px;
  background:#1d1d1d;
  border:1px solid #000;
  z-index:2;
}

.key.lit{
  background:var(--accent) !important;
}

.section-label{
  margin:22px 0 12px;
  font-size:.72rem;
  color:var(--muted);
  letter-spacing:.14em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:10px;
}

.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.chord-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.chord-btn{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 6px;
  text-align:center;
  cursor:pointer;
  transition:.08s;
}

.chord-btn:hover{
  border-color:var(--accent);
}

.chord-btn:active{
  transform:scale(.96);
}

.btn-name{
  font-family:'Playfair Display', serif;
  font-size:1rem;
  color:var(--accent);
  font-weight:700;
}

.footer{
  margin-top:26px;
  text-align:center;
  font-size:.72rem;
  color:var(--muted);
}

@media(max-width:560px){
  .chord-grid{
    grid-template-columns:repeat(3,1fr);
  }
}
</style>
</head>

<body>

<div class="main-col">

<header>
  <h1>Chord Piano</h1>
  <div class="sub">Improved Voicing & Safer Audio Engine</div>
</header>

<div id="visualizer">
  <canvas id="vis-canvas"></canvas>
  <div class="chord-label" id="chord-label"></div>
</div>

<div class="keyboard-wrap">
  <div id="keyboard"></div>
</div>

<div id="chord-sections"></div>

<div class="footer">
  Pure Offline Chord Piano • No API • Secure Local Audio
</div>

</div>

<script type="module">

// =========================
// AUDIO ENGINE
// =========================

let audioCtx = null;
let analyser = null;
const activeNodes = [];

function getAudio(){

  if(!audioCtx){

    audioCtx = new (
      window.AudioContext ||
      window.webkitAudioContext
    )();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.connect(audioCtx.destination);
  }

  return audioCtx;
}

function midiToFreq(m){
  return 440 * Math.pow(2, (m - 69) / 12);
}

function stopAllSounds(){

  activeNodes.forEach(node => {

    try{
      node.stop();
    }catch(e){}

    try{
      node.disconnect();
    }catch(e){}

  });

  activeNodes.length = 0;
}

function playVoice(midi, time, duration = 1.6, velocity = 0.18){

  const ac = getAudio();

  const master = ac.createGain();
  master.connect(analyser);

  // smoother piano-ish envelope
  master.gain.setValueAtTime(0, time);
  master.gain.linearRampToValueAtTime(velocity, time + 0.02);
  master.gain.exponentialRampToValueAtTime(0.0001, time + duration);

  // harmonic stack
  const harmonics = [
    {mul:1, gain:1.0},
    {mul:2, gain:0.22},
    {mul:3, gain:0.10},
    {mul:4, gain:0.04}
  ];

  harmonics.forEach(h => {

    const osc = ac.createOscillator();
    osc.type = 'sine';

    osc.frequency.value = midiToFreq(midi) * h.mul;

    const g = ac.createGain();
    g.gain.value = velocity * h.gain;

    osc.connect(g);
    g.connect(master);

    osc.start(time);
    osc.stop(time + duration);

    osc.onended = () => {

      try{ osc.disconnect(); }catch(e){}
      try{ g.disconnect(); }catch(e){}

    };

    activeNodes.push(osc);

  });

  setTimeout(() => {

    try{
      master.disconnect();
    }catch(e){}

  }, (duration * 1000) + 120);
}

// =========================
// MUSIC THEORY
// =========================

const ROOTS = {
  'C':60,
  'C#':61,
  'Db':61,
  'D':62,
  'D#':63,
  'Eb':63,
  'E':64,
  'F':65,
  'F#':66,
  'Gb':66,
  'G':67,
  'G#':68,
  'Ab':68,
  'A':69,
  'A#':70,
  'Bb':70,
  'B':71
};

// proper voicings
function buildChord(name){

  let chord = name.trim();

  let rootName = null;

  const two = chord.slice(0,2);

  if(ROOTS[two] !== undefined){

    rootName = two;
    chord = chord.slice(2);

  }else if(ROOTS[chord[0]] !== undefined){

    rootName = chord[0];
    chord = chord.slice(1);
  }

  if(!rootName) return null;

  let root = ROOTS[rootName];

  while(root > 59) root -= 12;
  while(root < 48) root += 12;

  const low = chord.toLowerCase();

  let intervals;

  // detection order matters

  if(low.includes('maj7')){

    intervals = [0,7,11,16];

  }else if(low.includes('m7b5')){

    intervals = [0,3,6,10];

  }else if(low.includes('dim7')){

    intervals = [0,3,6,9];

  }else if(low.includes('m7')){

    intervals = [0,7,10,15];

  }else if(low.includes('7')){

    intervals = [0,10,16,19];

  }else if(low.includes('sus4')){

    intervals = [0,7,12,17];

  }else if(low.includes('dim')){

    intervals = [0,3,6,15];

  }else if(low.includes('aug')){

    intervals = [0,4,8,16];

  }else if(
    low.includes('min') ||
    /^m(?!aj)/.test(low)
  ){

    intervals = [0,7,15];

  }else{

    intervals = [0,7,16];
  }

  return intervals.map(i => root + i);
}

// =========================
// KEYBOARD
// =========================

const keyEls = {};

function initKeyboard(){

  const kb = document.getElementById('keyboard');

  const whiteMap = [0,2,4,5,7,9,11];
  const blackOffsets = {
    1:-13,
    3:-13,
    6:-13,
    8:-13,
    10:-13
  };

  let whiteIndex = 0;

  for(let midi=48; midi<=83; midi++){

    const pc = midi % 12;
    const isWhite = whiteMap.includes(pc);

    const el = document.createElement('div');

    el.className = `key ${isWhite ? 'white' : 'black'}`;

    if(isWhite){

      el.style.left = (whiteIndex * 42) + 'px';
      whiteIndex++;

    }else{

      el.style.left =
        ((whiteIndex * 42) + blackOffsets[pc]) + 'px';
    }

    el.onmousedown = () => {

      playVoice(midi, getAudio().currentTime, 1.4, 0.22);

      el.classList.add('lit');

      setTimeout(() => {
        el.classList.remove('lit');
      }, 240);
    };

    keyEls[midi] = el;
    kb.appendChild(el);
  }
}

initKeyboard();

// =========================
// CHORD BUTTONS
// =========================

const SECTIONS = [

{
  label:'Basic',
  chords:[
    'C','Dm','Em','F',
    'G','Am','Bdim'
  ]
},

{
  label:'Minor',
  chords:[
    'Cm','Dm','Em','Fm',
    'Gm','Am','Bm'
  ]
},

{
  label:'7th',
  chords:[
    'C7','D7','E7','F7',
    'G7','A7','B7'
  ]
},

{
  label:'Maj7',
  chords:[
    'Cmaj7','Dmaj7','Emaj7',
    'Fmaj7','Gmaj7','Amaj7'
  ]
},

{
  label:'Extended',
  chords:[
    'Am7','Dm7','Em7',
    'Gsus4','Csus4','F#m',
    'Bb','Eb'
  ]
}

];

const sectionsEl =
document.getElementById('chord-sections');

SECTIONS.forEach(sec => {

  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = sec.label;

  sectionsEl.appendChild(label);

  const grid = document.createElement('div');
  grid.className = 'chord-grid';

  sec.chords.forEach(chord => {

    const btn = document.createElement('div');
    btn.className = 'chord-btn';

    btn.innerHTML =
      `<span class="btn-name">${chord}</span>`;

    btn.onclick = () => playChord(chord);

    grid.appendChild(btn);
  });

  sectionsEl.appendChild(grid);

});

// =========================
// PLAY CHORD
// =========================

function playChord(name){

  const notes = buildChord(name);

  if(!notes) return;

  const now = getAudio().currentTime;

  notes.forEach((midi, index) => {

    playVoice(
      midi,
      now + (index * 0.018),
      1.8,
      0.17
    );

    if(keyEls[midi]){

      keyEls[midi].classList.add('lit');

      setTimeout(() => {

        keyEls[midi].classList.remove('lit');

      }, 500);
    }

  });

  const label =
    document.getElementById('chord-label');

  label.textContent = name;
  label.style.opacity = 1;

  setTimeout(() => {
    label.style.opacity = 0;
  }, 900);
}

// =========================
// VISUALIZER
// =========================

const canvas =
document.getElementById('vis-canvas');

const ctx = canvas.getContext('2d');

function draw(){

  requestAnimationFrame(draw);

  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = canvas.offsetHeight;

  ctx.clearRect(0,0,w,h);

  if(!analyser) return;

  const data =
    new Uint8Array(analyser.frequencyBinCount);

  analyser.getByteTimeDomainData(data);

  ctx.beginPath();

  ctx.lineWidth = 2;
  ctx.strokeStyle = '#c8a96e';

  data.forEach((v,i) => {

    const x = (i / data.length) * w;

    const y =
      ((v - 128) / 128) * (h / 2) + (h / 2);

    if(i === 0){
      ctx.moveTo(x,y);
    }else{
      ctx.lineTo(x,y);
    }

  });

  ctx.stroke();
}

draw();

// =========================
// SAFETY
// =========================

window.addEventListener('beforeunload', () => {
  stopAllSounds();
});

</script>

</body>
</html>
