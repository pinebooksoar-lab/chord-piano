<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Offline Chord Piano</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@300;400&display=swap');

:root{
  --bg:#0d0d11;
  --surface:#17171f;
  --card:#20202b;
  --border:#2f2f40;
  --accent:#c8a96e;
  --text:#ece7df;
  --muted:#7d7971;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono', monospace;
  padding:24px 12px 50px;
  display:flex;
  justify-content:center;
}

.main{
  width:100%;
  max-width:860px;
}

header{
  text-align:center;
  margin-bottom:18px;
}

h1{
  font-family:'Playfair Display', serif;
  color:var(--accent);
  font-size:2rem;
  margin-bottom:6px;
}

.sub{
  color:var(--muted);
  font-size:.72rem;
  letter-spacing:.14em;
}

#visualizer{
  position:relative;
  height:74px;
  overflow:hidden;
  border-radius:10px;
  background:var(--surface);
  border:1px solid var(--border);
  margin-bottom:18px;
}

#vis{
  width:100%;
  height:100%;
}

#chordLabel{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display', serif;
  font-size:1.55rem;
  color:var(--accent);
  opacity:0;
  pointer-events:none;
  transition:opacity .25s;
}

.keyboard-wrap{
  overflow-x:auto;
  background:#101014;
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:20px;
  scrollbar-width:none;
}

.keyboard-wrap::-webkit-scrollbar{
  display:none;
}

#keyboard{
  position:relative;
  width:max-content;
  height:180px;
  margin:auto;
}

.key{
  position:absolute;
  border-radius:0 0 6px 6px;
  cursor:pointer;
  transition:.08s;
  user-select:none;
}

.white{
  width:42px;
  height:180px;
  background:#f4f4f4;
  border:1px solid #999;
  z-index:1;
}

.black{
  width:26px;
  height:108px;
  background:#1b1b1b;
  border:1px solid #000;
  z-index:2;
}

.key.active{
  background:var(--accent) !important;
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
  margin-bottom:24px;
}

.panel-title{
  font-size:.72rem;
  color:var(--muted);
  letter-spacing:.14em;
  margin-bottom:10px;
}

textarea{
  width:100%;
  min-height:100px;
  resize:vertical;
  border:none;
  outline:none;
  border-radius:8px;
  background:var(--card);
  color:var(--text);
  font-family:inherit;
  padding:12px;
  line-height:1.6;
  margin-bottom:12px;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

button{
  border:none;
  border-radius:8px;
  padding:10px 16px;
  cursor:pointer;
  font-family:inherit;
  font-weight:bold;
  transition:.08s;
}

button:active{
  transform:scale(.96);
}

.primary{
  background:var(--accent);
  color:#111;
}

.secondary{
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
}

.input-mode-on{
  background:var(--accent);
  color:#111;
}

.slider-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:6px;
}

.slider-wrap label{
  font-size:.75rem;
  color:var(--muted);
  width:50px;
}

.slider-wrap input{
  flex:1;
}

.value{
  width:60px;
  text-align:right;
  color:var(--accent);
}

.section-title{
  margin:24px 0 12px;
  font-size:.72rem;
  color:var(--muted);
  letter-spacing:.14em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:10px;
}

.section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.chord{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 6px;
  text-align:center;
  cursor:pointer;
  transition:.08s;
}

.chord:hover{
  border-color:var(--accent);
}

.chord:active{
  transform:scale(.96);
}

.chord span{
  font-family:'Playfair Display', serif;
  font-size:1rem;
  color:var(--accent);
}

.currentChord{
  border-color:var(--accent) !important;
  box-shadow:0 0 0 1px var(--accent);
}

.footer{
  text-align:center;
  margin-top:30px;
  font-size:.7rem;
  color:var(--muted);
}

@media(max-width:600px){

  .grid{
    grid-template-columns:repeat(3,1fr);
  }

}

</style>
</head>

<body>

<div class="main">

<header>
  <h1>Chord Piano</h1>
  <div class="sub">
    OFFLINE • LOCAL AUDIO • NO API
  </div>
</header>

<div id="visualizer">
  <canvas id="vis"></canvas>
  <div id="chordLabel"></div>
</div>

<div class="keyboard-wrap">
  <div id="keyboard"></div>
</div>

<div class="panel">

  <div class="panel-title">
    CHORD PROGRESSION
  </div>

  <textarea id="progression">C G Am Em
F C F G</textarea>

  <div class="controls">

    <button
      class="primary"
      id="playBtn"
    >
      ▶ PLAY
    </button>

    <button
      class="secondary"
      id="stopBtn"
    >
      ■ STOP
    </button>

    <button
      class="secondary"
      id="clearBtn"
    >
      CLEAR
    </button>

    <button
      class="secondary"
      id="inputModeBtn"
    >
      INPUT MODE: OFF
    </button>

  </div>

  <div class="slider-wrap">

    <label>BPM</label>

    <input
      type="range"
      id="bpm"
      min="40"
      max="240"
      value="120"
    >

    <div
      class="value"
      id="bpmValue"
    >
      120
    </div>

  </div>

  <div class="slider-wrap">

    <label>HOLD</label>

    <input
      type="range"
      id="hold"
      min="1"
      max="8"
      value="4"
    >

    <div
      class="value"
      id="holdValue"
    >
      4
    </div>

  </div>

</div>

<div id="sections"></div>

<div class="footer">
  Pure Offline Chord Instrument
</div>

</div>

<script type="module">

// ======================================
// AUDIO
// ======================================

let audioCtx = null;
let analyser = null;

const activeOscillators = [];

function getAudio(){

  if(!audioCtx){

    audioCtx = new (
      window.AudioContext ||
      window.webkitAudioContext
    )();

    analyser =
      audioCtx.createAnalyser();

    analyser.fftSize = 2048;

    analyser.connect(
      audioCtx.destination
    );
  }

  return audioCtx;
}

function midiToFreq(midi){

  return 440 * Math.pow(
    2,
    (midi - 69) / 12
  );
}

function playTone(
  midi,
  start,
  duration = 1.8,
  velocity = 0.16
){

  const ac = getAudio();

  const master =
    ac.createGain();

  master.connect(analyser);

  master.gain.setValueAtTime(
    0,
    start
  );

  master.gain.linearRampToValueAtTime(
    velocity,
    start + 0.02
  );

  master.gain.exponentialRampToValueAtTime(
    0.0001,
    start + duration
  );

  const harmonics = [
    {mul:1,gain:1.0},
    {mul:2,gain:0.24},
    {mul:3,gain:0.10},
    {mul:4,gain:0.04}
  ];

  harmonics.forEach(h => {

    const osc =
      ac.createOscillator();

    osc.type = 'sine';

    osc.frequency.value =
      midiToFreq(midi) * h.mul;

    const gain =
      ac.createGain();

    gain.gain.value =
      velocity * h.gain;

    osc.connect(gain);
    gain.connect(master);

    osc.start(start);
    osc.stop(start + duration);

    activeOscillators.push(osc);

    osc.onended = () => {

      const idx =
        activeOscillators.indexOf(osc);

      if(idx !== -1){

        activeOscillators.splice(idx,1);
      }

      try{
        osc.disconnect();
      }catch(e){}

      try{
        gain.disconnect();
      }catch(e){}
    };

  });

  setTimeout(() => {

    try{
      master.disconnect();
    }catch(e){}

  }, (duration * 1000) + 100);
}

function stopAll(){

  activeOscillators.forEach(osc => {

    try{
      osc.stop();
    }catch(e){}

    try{
      osc.disconnect();
    }catch(e){}
  });

  activeOscillators.length = 0;
}

// ======================================
// THEORY
// ======================================

const ROOTS = {

  'C':60,
  'C#':61,
  'Db':61,

  'D':62,
  'D#':63,
  'Eb':63,

  'E':64,

  'F':65,
  'F#':66,
  'Gb':66,

  'G':67,
  'G#':68,
  'Ab':68,

  'A':69,
  'A#':70,
  'Bb':70,

  'B':71
};

function getChordNotes(name){

  let chord =
    name.trim();

  let rootName = null;

  const two =
    chord.slice(0,2);

  if(ROOTS[two] !== undefined){

    rootName = two;
    chord = chord.slice(2);

  }else if(
    ROOTS[chord[0]] !== undefined
  ){

    rootName = chord[0];
    chord = chord.slice(1);
  }

  if(!rootName){
    return null;
  }

  let root = ROOTS[rootName];

  while(root > 59){
    root -= 12;
  }

  while(root < 48){
    root += 12;
  }

  const low =
    chord.toLowerCase();

  let notes = [];

  if(low.includes('maj7')){

    notes = [
      root,
      root + 7,
      root + 11,
      root + 16
    ];

  }else if(low.includes('m7b5')){

    notes = [
      root,
      root + 6,
      root + 10,
      root + 15
    ];

  }else if(low.includes('dim7')){

    notes = [
      root,
      root + 3,
      root + 6,
      root + 9
    ];

  }else if(low.includes('m7')){

    notes = [
      root,
      root + 7,
      root + 10,
      root + 15
    ];

  }else if(
    low.includes('min') ||
    /^m(?!aj)/.test(low)
  ){

    notes = [
      root,
      root + 7,
      root + 15
    ];

  }else if(low.includes('7')){

    notes = [
      root,
      root + 10,
      root + 16,
      root + 19
    ];

  }else if(low.includes('sus4')){

    notes = [
      root,
      root + 7,
      root + 12,
      root + 17
    ];

  }else if(low.includes('dim')){

    notes = [
      root,
      root + 3,
      root + 6,
      root + 15
    ];

  }else if(low.includes('aug')){

    notes = [
      root,
      root + 8,
      root + 16
    ];

  }else{

    notes = [
      root,
      root + 7,
      root + 16
    ];
  }

  return notes;
}

// ======================================
// KEYBOARD
// ======================================

const keyboard =
  document.getElementById(
    'keyboard'
  );

const keyMap = {};

function createKeyboard(){

  const whitePC = [
    0,2,4,5,7,9,11
  ];

  const blackOffsets = {
    1:-13,
    3:-13,
    6:-13,
    8:-13,
    10:-13
  };

  let whiteIndex = 0;

  for(
    let midi=48;
    midi<=83;
    midi++
  ){

    const pitchClass =
      midi % 12;

    const isWhite =
      whitePC.includes(
        pitchClass
      );

    const key =
      document.createElement('div');

    key.className =
      `key ${isWhite ? 'white' : 'black'}`;

    if(isWhite){

      key.style.left =
        (whiteIndex * 42) + 'px';

      whiteIndex++;

    }else{

      key.style.left =
        (
          whiteIndex * 42
          + blackOffsets[pitchClass]
        ) + 'px';
    }

    key.onmousedown = () => {

      playTone(
        midi,
        getAudio().currentTime,
        1.4,
        0.20
      );

      lightKey(midi);
    };

    keyMap[midi] = key;

    keyboard.appendChild(key);
  }
}

createKeyboard();

function lightKey(midi){

  if(!keyMap[midi]){
    return;
  }

  keyMap[midi].classList.add(
    'active'
  );

  setTimeout(() => {

    keyMap[midi].classList.remove(
      'active'
    );

  }, 400);
}

// ======================================
// PLAY CHORD
// ======================================

function playChord(name){

  const notes =
    getChordNotes(name);

  if(!notes){
    return;
  }

  const now =
    getAudio().currentTime;

  notes.forEach((midi,index) => {

    playTone(
      midi,
      now + (index * 0.018),
      1.8,
      0.16
    );

    lightKey(midi);
  });

  const label =
    document.getElementById(
      'chordLabel'
    );

  label.textContent = name;

  label.style.opacity = 1;

  setTimeout(() => {

    label.style.opacity = 0;

  }, 900);
}

// ======================================
// INPUT MODE
// ======================================

let inputMode = false;

const inputModeBtn =
  document.getElementById(
    'inputModeBtn'
  );

inputModeBtn.onclick = () => {

  inputMode = !inputMode;

  inputModeBtn.textContent =
    inputMode
    ? 'INPUT MODE: ON'
    : 'INPUT MODE: OFF';

  inputModeBtn.classList.toggle(
    'input-mode-on',
    inputMode
  );
};

function addChordToProgression(chord){

  const textarea =
    document.getElementById(
      'progression'
    );

  let value =
    textarea.value.trim();

  if(value.length > 0){

    value += ' ';
  }

  value += chord;

  textarea.value = value;
}

// ======================================
// CHORD BUTTONS
// ======================================

const DATA = [

{
  title:'Basic',
  chords:[
    'C','Dm','Em',
    'F','G','Am',
    'Bdim'
  ]
},

{
  title:'Minor',
  chords:[
    'Cm','Fm',
    'Gm','Bm'
  ]
},

{
  title:'7th',
  chords:[
    'C7','D7',
    'E7','F7',
    'G7','A7'
  ]
},

{
  title:'Maj7',
  chords:[
    'Cmaj7',
    'Dmaj7',
    'Fmaj7',
    'Gmaj7',
    'Amaj7'
  ]
},

{
  title:'Soul / Jazz',
  chords:[
    'Am7','Dm7',
    'Em7','Gsus4',
    'Csus4','Bb',
    'Eb','F#m'
  ]
}

];

const sections =
  document.getElementById(
    'sections'
  );

DATA.forEach(section => {

  const title =
    document.createElement('div');

  title.className =
    'section-title';

  title.textContent =
    section.title;

  sections.appendChild(title);

  const grid =
    document.createElement('div');

  grid.className = 'grid';

  section.chords.forEach(chord => {

    const btn =
      document.createElement('div');

    btn.className = 'chord';

    btn.innerHTML =
      `<span>${chord}</span>`;

    btn.onclick = () => {

      playChord(chord);

      if(inputMode){

        addChordToProgression(
          chord
        );
      }
    };

    grid.appendChild(btn);
  });

  sections.appendChild(grid);
});

// ======================================
// PROGRESSION
// ======================================

const textarea =
  document.getElementById(
    'progression'
  );

const bpmSlider =
  document.getElementById(
    'bpm'
  );

const bpmValue =
  document.getElementById(
    'bpmValue'
  );

const holdSlider =
  document.getElementById(
    'hold'
  );

const holdValue =
  document.getElementById(
    'holdValue'
  );

bpmSlider.oninput = () => {

  bpmValue.textContent =
    bpmSlider.value;
};

holdSlider.oninput = () => {

  holdValue.textContent =
    holdSlider.value;
};

let progressionTimer = null;
let progressionIndex = 0;

function parseProgression(){

  return textarea.value
    .split(/\s+/)
    .filter(Boolean);
}

function clearHighlights(){

  document.querySelectorAll(
    '.currentChord'
  ).forEach(el => {

    el.classList.remove(
      'currentChord'
    );
  });
}

function highlightChord(chord){

  clearHighlights();

  document.querySelectorAll(
    '.chord'
  ).forEach(el => {

    if(
      el.innerText.trim()
      === chord
    ){

      el.classList.add(
        'currentChord'
      );
    }

  });
}

function playProgression(){

  stopProgression();

  const chords =
    parseProgression();

  if(!chords.length){
    return;
  }

  const bpm =
    Number(bpmSlider.value);

  const hold =
    Number(holdSlider.value);

  const interval =
    (60 / bpm)
    * 1000
    * hold;

  progressionIndex = 0;

  function next(){

    const chord =
      chords[
        progressionIndex
        % chords.length
      ];

    playChord(chord);

    highlightChord(chord);

    progressionIndex++;

    progressionTimer =
      setTimeout(
        next,
        interval
      );
  }

  next();
}

function stopProgression(){

  clearTimeout(
    progressionTimer
  );

  progressionTimer = null;

  clearHighlights();

  stopAll();
}

document.getElementById(
  'playBtn'
).onclick = playProgression;

document.getElementById(
  'stopBtn'
).onclick = stopProgression;

document.getElementById(
  'clearBtn'
).onclick = () => {

  textarea.value = '';
};

// ======================================
// VISUALIZER
// ======================================

const canvas =
  document.getElementById(
    'vis'
  );

const vctx =
  canvas.getContext('2d');

function draw(){

  requestAnimationFrame(draw);

  const w =
    canvas.width =
    canvas.offsetWidth;

  const h =
    canvas.height =
    canvas.offsetHeight;

  vctx.clearRect(0,0,w,h);

  if(!analyser){
    return;
  }

  const data =
    new Uint8Array(
      analyser.frequencyBinCount
    );

  analyser.getByteTimeDomainData(
    data
  );

  vctx.beginPath();

  vctx.lineWidth = 2;
  vctx.strokeStyle = '#c8a96e';

  data.forEach((v,i) => {

    const x =
      (i / data.length) * w;

    const y =
      (
        ((v - 128) / 128)
        * (h / 2)
      ) + (h / 2);

    if(i === 0){

      vctx.moveTo(x,y);

    }else{

      vctx.lineTo(x,y);
    }

  });

  vctx.stroke();
}

draw();

// ======================================
// CLEANUP
// ======================================

window.addEventListener(
  'beforeunload',
  stopAll
);

</script>

</body>
</html>
